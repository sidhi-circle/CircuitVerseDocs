name: 🐞 Bug
description: Create a report to help us improve
title: "🐞 Bug"
labels:
  - "🐞 bug"
  - "pending triage"
body:
  - type: checkboxes
    id: terms
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered
      options:
        - label: I have searched the existing issues
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is
      placeholder: Describe...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots/GIFs
      description: If applicable, add screenshots or GIFs to help explain your problem
    validations:
      required: false

  - type: textarea
    id: device-info
    attributes:
      label: Device Information [optional]
      description: |
        examples:
          - **OS**: Ubuntu 20.04
          - **Browser**: chrome
          - **version**: 22
      value: |
        - OS:
        - Browser:
        - Version:
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here
    validations:
      required: false

  - type: dropdown
    id: working-on-it
    attributes:
      label: Are you working on this issue?
      options:
        - "Yes"
        - "No"
    validations:
      required: true